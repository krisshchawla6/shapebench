const SERIES = [
  {key:'v3_oracle_80_30_i10',         label:'v3_oracle_80_30_i10 ★',  color:'#ff6b35', w:3.0,  dash:null,    bold:true},
  {key:'geo_b30_f0003',               label:'geo_b30_f0003',           color:'#4fc3f7', w:2.0,  dash:null},
  {key:'geo_b20_f003',                label:'geo_b20_f003',            color:'#66bb6a', w:2.0,  dash:null},
  {key:'PSO (particle_swarm)',        label:'PSO particle_swarm',      color:'#ffd54f', w:2.0,  dash:null},
  {key:'dynamic_sampling_50_30',      label:'dynamic_50_30',           color:'#ce93d8', w:1.7,  dash:null},
  {key:'dynamic_sampling_50_30_v2',   label:'dynamic_50_30_v2',        color:'#80cbc4', w:1.5,  dash:[5,4]},
  {key:'dynamic_sampling_50_30_hybrid',label:'dynamic_50_30_hybrid',  color:'#f48fb1', w:1.5,  dash:[5,4]},
  {key:'dynamic_sampling_50_30_hybrid_v2',label:'dynamic_50_30_hybrid_v2',color:'#90caf9',w:1.5,dash:[5,4]},
  {key:'geo_b30_f001',                label:'geo_b30_f001',            color:'#a5d6a7', w:1.5,  dash:[5,4]},
  {key:'adaptive_b20_default',        label:'adaptive_b20_default',    color:'#bcaaa4', w:1.5,  dash:[5,4]},
  {key:'geo_b20_f001',                label:'geo_b20_f001',            color:'#ef9a9a', w:1.5,  dash:[5,4]},
];

// Canvas setup — size dynamically
const canvas = document.getElementById('c');
const DPR = window.devicePixelRatio || 1;
const W_CSS = Math.min(980, window.innerWidth - 48);
const H_CSS = Math.round(W_CSS * 0.58);
canvas.style.width  = W_CSS + 'px';
canvas.style.height = H_CSS + 'px';
canvas.width  = W_CSS * DPR;
canvas.height = H_CSS * DPR;
const ctx = canvas.getContext('2d');
ctx.scale(DPR, DPR);
const W = W_CSS, H = H_CSS;

const PAD = {top:22, right:28, bot:52, left:68};
const PW = W - PAD.left - PAD.right;
const PH = H - PAD.top  - PAD.bot;

// Log scale helpers
const LX0 = Math.log10(1), LX1 = Math.log10(3000);
const LY0 = Math.log10(0.085), LY1 = Math.log10(12);

function sx(s) { return PAD.left + (Math.log10(Math.max(s,1)) - LX0) / (LX1 - LX0) * PW; }
function sy(v) { return PAD.top  + PH - (Math.log10(Math.max(v,0.001)) - LY0) / (LY1 - LY0) * PH; }

const hidden = new Set();

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0c0c16'; ctx.fillRect(0, 0, W, H);

  // ── Grid ──────────────────────────────────────────────────────────
  ctx.save();
  ctx.strokeStyle = '#14142a'; ctx.lineWidth = 1;
  [1,2,5,10,20,50,100,200,500,1000,2000,3000].forEach(v => {
    const x = sx(v);
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top+PH); ctx.stroke();
  });
  [0.09,0.1,0.11,0.12,0.15,0.2,0.3,0.5,1,2,5,10].forEach(v => {
    const y = sy(v);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left+PW, y); ctx.stroke();
  });
  ctx.restore();

  // ── Axes ──────────────────────────────────────────────────────────
  ctx.save();
  ctx.strokeStyle = '#2a2a40'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD.left, PAD.top); ctx.lineTo(PAD.left, PAD.top+PH);
  ctx.moveTo(PAD.left, PAD.top+PH); ctx.lineTo(PAD.left+PW, PAD.top+PH);
  ctx.stroke();
  ctx.restore();

  // ── Tick labels ───────────────────────────────────────────────────
  ctx.save();
  ctx.font = `${Math.round(10*DPR)/DPR}px JetBrains Mono, monospace`;
  ctx.fillStyle = '#555';

  ctx.textAlign = 'center';
  [1,2,5,10,20,50,100,200,500,1000,2000,3000].forEach(v => {
    ctx.fillText(v >= 1000 ? (v/1000)+'k' : String(v), sx(v), PAD.top+PH+15);
  });
  ctx.textAlign = 'right';
  [0.09,0.1,0.12,0.15,0.2,0.3,0.5,1,2,5,10].forEach(v => {
    const lbl = v < 1 ? v.toFixed(2) : String(v);
    ctx.fillText(lbl, PAD.left-7, sy(v)+3.5);
  });
  ctx.restore();

  // ── Axis labels ───────────────────────────────────────────────────
  ctx.save();
  ctx.fillStyle = '#666'; ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Valid Simulations (log scale)', PAD.left + PW/2, H - 6);
  ctx.translate(13, PAD.top + PH/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('|Reward|  (log scale, lower = better)', 0, 0);
  ctx.restore();

  // ── Reference line ────────────────────────────────────────────────
  const BEST = 0.0923; // geo_b30_f0003 final
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1; ctx.setLineDash([3,7]);
  ctx.beginPath(); ctx.moveTo(PAD.left, sy(BEST)); ctx.lineTo(PAD.left+PW, sy(BEST)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font = '9px JetBrains Mono, monospace'; ctx.textAlign = 'right';
  ctx.fillText('best: 0.0923', PAD.left+PW-4, sy(BEST)-5);
  ctx.restore();

  // ── Lines ─────────────────────────────────────────────────────────
  SERIES.forEach(({key, color, w, dash, bold}) => {
    if (hidden.has(key)) return;
    const pts = DATA[key]; if (!pts || pts.length < 2) return;

    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth   = w;
    ctx.globalAlpha = bold ? 1 : 0.72;
    ctx.lineJoin    = 'round';
    if (dash) ctx.setLineDash(dash);

    ctx.beginPath();
    pts.forEach(([s, v], i) => {
      const x = sx(s), y = sy(v);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // endpoint dot
    const [ls, lv] = pts[pts.length - 1];
    ctx.setLineDash([]);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(sx(ls), sy(lv), bold ? 4.5 : 2.8, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ── Legend ─────────────────────────────────────────────────────────
const legEl = document.getElementById('leg');
SERIES.forEach(({key, label, color, dash, bold}) => {
  if (!DATA[key]) return;
  const el = document.createElement('div');
  el.className = 'leg';

  const sw = document.createElement('canvas');
  sw.className = 'swatch';
  sw.width = 26; sw.height = bold ? 4 : 3;
  sw.style.width = '26px'; sw.style.height = (bold ? 4 : 3) + 'px';
  const sc = sw.getContext('2d');
  sc.strokeStyle = color; sc.lineWidth = bold ? 4 : 3;
  if (dash) sc.setLineDash(dash);
  sc.beginPath(); sc.moveTo(0, sw.height/2); sc.lineTo(26, sw.height/2); sc.stroke();

  const txt = document.createElement('span');
  txt.textContent = label;
  if (bold) { txt.style.color = '#ff8c5a'; txt.style.fontWeight = '700'; }

  el.appendChild(sw); el.appendChild(txt);
  el.addEventListener('click', () => {
    if (hidden.has(key)) hidden.delete(key); else hidden.add(key);
    el.classList.toggle('off'); draw();
  });
  legEl.appendChild(el);
});

draw();
