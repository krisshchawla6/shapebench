Data:
  args:
    batch_size: 4
    data_cache_file: /mnt/nfs_project_a/yichen/star_cache/DrivAerStar_3Vehicles.pt
    data_dirs:
    - /mnt/nfs_project_a/leiyao/dataset/DrivAerStar_144/vtk_E/
    - /mnt/nfs_project_a/leiyao/dataset/DrivAerStar_144/vtk_F/
    - /mnt/nfs_project_a/leiyao/dataset/DrivAerStar_144/vtk_N/
    no_cache: false
    num_test: 150
    num_train: 12000
    num_val: 150
    val_batch_size: 1
  type: DrivAerStar_3Vehicles
Seed: 42
Trainer:
  args:
    accelerator: gpu
    devices: 1
    max_epochs: 500
load_ckpt: null
network:
  args:
    hyperparameter:
      epochs: 500
      lr: 0.001
      max_grad_norm: 0.1
      ntrain: 50
      weight_decay: 0.0001
    model:
      act: gelu
      attn_dropout: 0.0
      attn_type: linear
      branch_sizes: []
      ffn_dropout: 0.0
      horiz_fourier_dim: 0
      mlp_layers: 3
      n_experts: 1
      n_head: 1
      n_hidden: 8
      n_inner: 4
      n_layers: 3
      output_size: 4
      space_dim: 2
      trunk_size: 3
  type: CGPT
